<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>América Esports - 1xBet</title>

<style>
:root {
  --card: rgba(18, 24, 42, 0.92);
  --primary: #3b82f6;
  --text: #e5e7eb;
  --muted: #9ca3af;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
  min-height: 100vh;
  color: var(--text);
  background: url("assets/fondo-marciano.png") center / cover no-repeat fixed;
}

.overlay{
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top,
  rgba(59,130,246,0.25),
  rgba(8,10,20,0.92));
}

/* APP */
.app {
  position: relative;
  z-index: 1;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  padding: 16px 20px;
  border-radius: 16px;
  background: rgba(20,25,45,0.75);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
}

.header img {
  width: 48px;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.header h1::after {
  content: " LIVE HUB";
  color: var(--primary);
}

/* NAV */
.nav {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
  gap: 18px;
  margin-bottom: 28px;
}

.nav-btn {
  height: 120px;
  border-radius: 18px;
  background: rgba(18,24,42,0.85);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .25s ease;
  cursor: pointer;
}

.nav-btn img{
  width: 70px;
  height: 70px;
}

.nav-btn:hover{
  transform: translateY(-5px);
  background: linear-gradient(
    180deg,
    rgba(59,130,246,0.35),
    rgba(59,130,246,0.15)
  );
  box-shadow: 0 12px 30px rgba(59,130,246,0.25);
}

.nav-btn.active{
  background: linear-gradient(
    180deg,
    rgba(59,130,246,0.45),
    rgba(59,130,246,0.2)
  );
}
/* CONTENT */
#view-container {
  min-height: 300px;
}

/* CARD */
.card {
  background: rgba(20,25,45,0.85);
  border-radius: 22px;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  margin-bottom:20px;
}

/* VIDEO */
.video-box {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  border-radius: 14px;
  overflow: hidden;
  background: #020617;
  margin-top: 16px;
}

.video-box iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* SOCIAL */
.social-title {
  margin-top: 28px;
  margin-bottom: 12px;
  font-size: 1.1rem;
  font-weight: 600;
}

.social-bar{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:28px;
}

.social-btn{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  transition:all .25s ease;
}

.social-btn img{
  width:32px;
}

.social-btn:hover{
  transform:scale(1.15);
  background:rgba(59,130,246,0.25);
}

.social-btn img {
  width: 80px;                /* mucho más grande */
  height: 80px;
  object-fit: contain;
}

.nav-btn:hover img,
.social-btn:hover img {
  transform: scale(1.08);
  transition: transform 0.2s ease;
}



.social-btn.facebook { background: rgba(59,130,246,.15); }
.social-btn.youtube { background: rgba(239,68,68,.15); }
.social-btn.kick     { background: rgba(34,197,94,.15); }
.social-btn.twitch   { background: rgba(168,85,247,.15); }


/* ============================= */
/* VISTAS CREAR / REGISTRO / RETIRO */
/* ============================= */

.app-selector {
  display: flex;
  gap: 12px;
  margin: 18px 0 22px;
}

.app-btn {
  flex: 1;
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
}

.app-btn:hover {
  background: rgba(59,130,246,0.25);
}

.app-btn.active {
  background: var(--primary);
  border-color: var(--primary);
}

/* Contenedores por App */
.steps.app-content {
  display: none;
}

.steps.app-content.active {
  display: block;
}

/* Pasos */
.steps {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.step {
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  padding: 18px;
}

.step h4 {
  color: var(--primary);
  font-size: 1rem;
  margin-bottom: 6px;
}

.step p {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 10px;
}

.step img {
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
  display: block;
}

.card,
.nav-btn{
  animation: fadeUp .5s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(15px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
/*--HOME CSS--*/

.home-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

@media(max-width:800px){
.home-grid{
grid-template-columns:1fr;
}
}
/* FORMULARIO MARCIANO */

.marciano-form{
display:flex;
flex-direction:column;
gap:12px;
margin-top:15px;
}

.marciano-form input,
.marciano-form select{
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(0,0,0,0.35);
color:white;
font-size:14px;
}

.marciano-form button{
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:var(--primary);
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.marciano-form button:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(59,130,246,0.3);
}


/* RANKING */

.ranking-list{
list-style:none;
margin-top:12px;
display:flex;
flex-direction:column;
gap:8px;
}

.ranking-list li{
padding:10px 14px;
background:rgba(255,255,255,0.05);
border-radius:10px;
font-weight:500;
}



</style>
</head>

<body>

<div class="overlay"></div>

<div class="app">

  <div class="header">
    <img src="assets/logo.png">
    <h1>América Esports</h1>
  </div>

  <div class="nav">
    <div class="nav-btn active" onclick="loadView('home', this)">
      <img src="assets/icons/concurso.png">
    </div>
    <div class="nav-btn" onclick="loadView('crear', this)">
      <img src="assets/icons/cuenta.png">
    </div>
    <div class="nav-btn" onclick="loadView('retiro', this)">
      <img src="assets/icons/retiro.png">
    </div>
    <div class="nav-btn" onclick="loadView('envivo', this)">
      <img src="assets/icons/envivo.png">
    </div>
  </div>

  <div id="view-container"></div>

  <h3 class="social-title">Mis redes mi dey</h3>
  <div class="social-bar">
    <a class="social-btn facebook" href="https://www.facebook.com/americaesportsdota2" target="_blank"><img src="assets/icons/fbicon.png"></a>
    <a class="social-btn youtube" href="https://www.youtube.com/@americaesportsdota2" target="_blank"><img src="assets/icons/yticon.png"></a>
    <a class="social-btn kick" href="https://kick.com/americaesportsdota2" target="_blank"><img src="assets/icons/kickicon.png"></a>
    <a class="social-btn twitch" href="https://www.twitch.tv/americaesportsdota2" target="_blank"><img src="assets/icons/twitchicon.png"></a>
  </div>

</div>

<script >
 
/* CARGA VISTAS */
window.loadView = function(view, btn) {
  fetch(`views/${view}.html`)
    .then(r => {
      if (!r.ok) throw new Error("Vista no encontrada");
      return r.text();
    })
    .then(html => {
      const container = document.getElementById("view-container");
      container.innerHTML = html;

      document.querySelectorAll(".nav-btn")
        .forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");

      requestAnimationFrame(() => {
        initAppSelectors();
      });
    })
    .catch(err => {
      document.getElementById("view-container").innerHTML =
        `<div class="card">Error cargando la vista</div>`;
      console.error(err);
    });
};

function initAppSelectors() {
  const buttons = document.querySelectorAll(".app-btn");
  const contents = document.querySelectorAll(".app-content");

  buttons.forEach(btn => {
    btn.onclick = () => {
      buttons.forEach(b => b.classList.remove("active"));
      contents.forEach(c => c.classList.remove("active"));

      btn.classList.add("active");
      document.getElementById(btn.dataset.app)?.classList.add("active");
    };
  });
}


loadView("home", document.querySelector(".nav-btn"));


/*-Script de Formulario-*/

document.addEventListener("change", function(e){

if(e.target.id === "pais"){

const ciudad = document.getElementById("ciudadPeru")
const distrito = document.getElementById("distritoLima")

if(e.target.value === "peru"){
ciudad.style.display = "block"
}else{
ciudad.style.display = "none"
distrito.style.display = "none"
}

}

if(e.target.id === "ciudadPeru"){

const distrito = document.getElementById("distritoLima")

if(e.target.value === "lima"){
distrito.style.display = "block"
}else{
distrito.style.display = "none"
}

}

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conozcámonos - Marciano</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/app.css">

</head>

<body>

<section class="hero">

<div class="hero-content">

<div class="brand">
<img src="assets/logo.png">
<h1>Conozcámonos</h1>
</div>

<p class="subtitle">
Antes de entrar a la comunidad quiero saber un poco más de ti 👽
</p>

<form id="formMarciano" class="marciano-form">

<input name="nombre" placeholder="Nombre">

<input name="edad" placeholder="Edad">

<select name="pais" id="pais">
<option value="">País</option>
<option>Perú</option>
<option>Chile</option>
<option>México</option>
</select>

<select name="ciudad" id="ciudadPeru" style="display:none">
<option>Lima</option>
<option>Arequipa</option>
<option>Trujillo</option>
</select>

<select name="distrito" id="distritoLima" style="display:none">
<option>Miraflores</option>
<option>San Isidro</option>
<option>Surco</option>
</select>

<input name="cuenta" placeholder="Cuenta 1xBet">

<button type="submit" class="btn primary">
Enviar
</button>

</form>

</div>

</section>

<script src="js/form.js"></script>

</body>
</html>
